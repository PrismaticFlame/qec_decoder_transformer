# version: "3.9"

services:
  # CPU-only version (default)
  transformer-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: transformer-dev:latest
    container_name: transformer-dev
    working_dir: /workspace
    volumes:
      - ./:/workspace
    stdin_open: true
    tty: true
    command: bash

  # GPU version - use with: docker compose run --rm transformer-gpu bash
  transformer-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: transformer-dev:latest
    container_name: transformer-gpu
    working_dir: /workspace
    volumes:
      - ./:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              count: "all"
    stdin_open: true
    tty: true
    command: bash
