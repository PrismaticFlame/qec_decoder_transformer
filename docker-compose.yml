version: "3.9"

services:
  transformer-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: transformer-dev:latest
    container_name: transformer-dev
    working_dir: /workspace
    # Mount your local project into the container
    volumes:
      - ./:/workspace
    # Enable GPU access (requires NVIDIA Container Toolkit on host)
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
              driver: nvidia
              count: "all"
    stdin_open: true
    tty: true
    command: bash
